# ==========================================
# LOCATION VIEWS
# ==========================================
- model: ui.view
  ext_id: asset_lending_view_location_list
  fields:
    name: "asset_lending.location - Lista"
    model_key: asset_lending.location
    type_id.ext_id: ui.ui_view_type_list
    definition:
      columns:
        - { field: id, label: ID, width: 70 }
        - { field: name, label: Ubicación, sortable: true }
        - { field: code, label: Código }
        - { field: is_active, label: Activo, type: boolean }
      actions:
        - { name: new, type: create, icon: mdi-plus, label: "Nueva" }
        - { name: edit, type: update, icon: mdi-pencil, label: "Editar" }
        - { name: delete, type: delete, icon: mdi-delete, label: "Borrar" }

- model: ui.view
  ext_id: asset_lending_view_location_form
  fields:
    name: "asset_lending.location - Form"
    model_key: asset_lending.location
    type_id.ext_id: ui.ui_view_type_form
    definition:
      groups:
        - label: Datos de Ubicación
          fields: [name, code, is_active]

# ==========================================
# ASSET VIEWS
# ==========================================
- model: ui.view
  ext_id: asset_lending_view_asset_list
  fields:
    name: "asset_lending.asset - Lista"
    model_key: asset_lending.asset
    type_id.ext_id: ui.ui_view_type_list
    definition:
      columns:
        - { field: id, label: ID, width: 70 }
        - { field: asset_code, label: Código, width: 120 }
        - { field: name, label: Recurso, sortable: true }
        - { field: location_id, label: Ubicación }
        - { field: status, label: Estado, chip: true } 
        - { field: responsible_user_id, label: Responsable }
      actions:
        - { name: new, type: create, icon: mdi-plus, label: "Nuevo" }
        - { name: edit, type: update, icon: mdi-pencil, label: "Editar" }
        - { name: delete, type: delete, icon: mdi-delete, label: "Borrar" }
      row_actions:
        - key: mark_maintenance
          type: service
          label: "A Mantenimiento"
          icon: mdi-wrench
          method: mark_maintenance
          model_key: asset_lending.asset
          groups: [asset_lending_group_manager]
          hidden: "item.status !== 'available'"
        - key: release_maintenance
          type: service
          label: "Liberar Mantenimiento"
          icon: mdi-wrench-check
          method: release_maintenance
          model_key: asset_lending.asset
          groups: [asset_lending_group_manager]
          hidden: "item.status !== 'maintenance'"

- model: ui.view
  ext_id: asset_lending_view_asset_form
  fields:
    name: "asset_lending.asset - Form"
    model_key: asset_lending.asset
    type_id.ext_id: ui.ui_view_type_form
    definition:
      groups:
        - label: Información Principal
          fields: [name, asset_code, location_id, responsible_user_id]
        - label: Estado y Notas
          fields: [status, notes]

# ==========================================
# LOAN VIEWS
# ==========================================
- model: ui.view
  ext_id: asset_lending_view_loan_list
  fields:
    name: "asset_lending.loan - Lista"
    model_key: asset_lending.loan
    type_id.ext_id: ui.ui_view_type_list
    definition:
      columns:
        - { field: id, label: ID, width: 70 }
        - { field: asset_id, label: Recurso }
        - { field: borrower_user_id, label: Prestatario }
        - { field: status, label: Estado, chip: true } 
        - { field: checkout_at, label: Salida }
        - { field: due_at, label: Devolución Prevista }
      actions:
        - { name: new, type: create, icon: mdi-plus, label: "Nuevo Préstamo" }
        - { name: edit, type: update, icon: mdi-pencil, label: "Editar" }
      row_actions:
        - key: return_asset
          type: service
          label: "Devolver Recurso"
          icon: mdi-keyboard-return
          method: return_asset
          model_key: asset_lending.loan
          groups: [asset_lending_group_manager]
          hidden: "item.status !== 'open'"
          confirm:
            text: "¿Confirmar la devolución del equipo?"
          params:
            - name: note
              label: "Nota de devolución (opcional)"
              type: string

- model: ui.view
  ext_id: asset_lending_view_loan_form
  fields:
    name: "asset_lending.loan - Form"
    model_key: asset_lending.loan
    type_id.ext_id: ui.ui_view_type_form
    definition:
      groups:
        - label: Datos del Préstamo
          fields: [asset_id, borrower_user_id, due_at, status]
        - label: Notas
          fields: [checkout_note, return_note]
        - label: Auditoría
          fields: [checkout_at, returned_at]